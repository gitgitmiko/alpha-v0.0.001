name: xbox_region_store_browser
description: Xbox Region Store Browser - browse Xbox Store games across regions with Game Pass info.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # Routing
  go_router: ^14.6.2

  # Ads & billing
  google_mobile_ads: ^5.2.0
  in_app_purchase: ^3.2.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  flutter_local_notifications: ^18.0.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Utils
  equatable: ^2.0.7
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  workmanager: ^0.9.0+3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env.example
